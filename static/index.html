<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Canvas</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #58a6ff;
    --purple: #a371f7;
    --green: #3fb950;
    --amber: #d29922;
    --red: #f85149;
    --text: #e6edf3;
    --muted: #8b949e;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; overflow: hidden; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Layout */
  #app { display: grid; grid-template-columns: 220px 1fr 300px; grid-template-rows: 44px 1fr 36px; height: 100vh; }

  /* Header */
  #header { grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; padding: 0 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
  #header h1 { font-size: 15px; font-weight: 600; color: var(--text); }
  #header h1 span { color: var(--accent); }
  #status-badge { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: var(--border); color: var(--muted); }
  #status-badge.live { background: #0a3d1a; color: var(--green); }
  #status-badge.error { background: #3d0a0a; color: var(--red); }
  #run-info { margin-left: auto; font-size: 12px; color: var(--muted); font-family: var(--mono); }

  /* Run List */
  #sidebar { grid-row: 2; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 8px 0; }
  #sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); padding: 8px 12px; }
  .run-item { padding: 8px 12px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; }
  .run-item:hover { background: rgba(88,166,255,0.05); }
  .run-item.active { border-left-color: var(--accent); background: rgba(88,166,255,0.08); }
  .run-item .name { font-size: 13px; font-weight: 500; }
  .run-item .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .run-item .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; }
  .run-item .status-dot.completed { background: var(--green); }
  .run-item .status-dot.running { background: var(--accent); animation: pulse 1s infinite; }
  .run-item .status-dot.error { background: var(--red); }
  .run-item .status-dot.idle { background: var(--muted); }

  /* Canvas */
  #canvas-area { grid-row: 2; position: relative; overflow: hidden; background: var(--bg); }
  #canvas-svg { width: 100%; height: 100%; cursor: grab; }
  #canvas-svg:active { cursor: grabbing; }
  .node-group { cursor: pointer; }
  .node-rect { fill: var(--surface); stroke: var(--border); stroke-width: 1.5; rx: 6; transition: stroke 0.2s; }
  .node-group:hover .node-rect { stroke: var(--accent); }
  .node-group.active .node-rect { stroke: var(--accent); stroke-width: 2; }
  .node-group.pulse .node-rect { animation: nodePulse 0.4s ease-out; }
  .node-label { fill: var(--text); font-size: 12px; font-family: var(--mono); text-anchor: middle; dominant-baseline: central; }
  .node-type-badge { fill: var(--muted); font-size: 9px; font-family: var(--mono); text-anchor: middle; }
  .edge-line { stroke: var(--border); stroke-width: 1.5; fill: none; }
  .edge-line.active { stroke: var(--accent); stroke-width: 2; }
  .edge-label { fill: var(--muted); font-size: 10px; font-family: var(--mono); text-anchor: middle; }
  .packet { fill: var(--accent); r: 3; }

  /* Inspector */
  #inspector { grid-row: 2; background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; padding: 12px; }
  #inspector h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; }
  #inspector .section { margin-bottom: 16px; }
  #inspector .section h4 { font-size: 11px; color: var(--accent); margin-bottom: 4px; font-family: var(--mono); }
  #inspector pre { font-family: var(--mono); font-size: 11px; background: var(--bg); padding: 8px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; color: var(--text); }
  #inspector .empty { color: var(--muted); font-style: italic; font-size: 12px; }
  #inspector .event-list { list-style: none; }
  #inspector .event-list li { font-size: 11px; font-family: var(--mono); padding: 3px 0; border-bottom: 1px solid var(--border); color: var(--muted); }
  #inspector .event-list li .ev-type { color: var(--accent); }
  #inspector .event-list li .ev-node { color: var(--purple); }

  /* Timeline */
  #timeline { grid-column: 1 / -1; grid-row: 3; display: flex; align-items: center; gap: 8px; padding: 0 12px; background: var(--surface); border-top: 1px solid var(--border); }
  #timeline input[type=range] { flex: 1; height: 4px; -webkit-appearance: none; appearance: none; background: var(--border); border-radius: 2px; outline: none; }
  #timeline input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  #timeline input[type=range]::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; border: none; }
  #timeline .time-label { font-size: 11px; font-family: var(--mono); color: var(--muted); min-width: 60px; }
  #timeline .controls { display: flex; gap: 4px; }
  #timeline button { background: var(--border); border: none; color: var(--text); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  #timeline button:hover { background: var(--accent); color: #000; }
  #timeline button:disabled { opacity: 0.4; cursor: default; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes nodePulse { 0% { filter: brightness(1); } 50% { filter: brightness(1.4); } 100% { filter: brightness(1); } }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>Agent <span>Canvas</span></h1>
    <span id="status-badge">disconnected</span>
    <span id="run-info"></span>
  </div>
  <div id="sidebar">
    <h3>Runs</h3>
    <div id="run-list"></div>
  </div>
  <div id="canvas-area">
    <svg id="canvas-svg"></svg>
  </div>
  <div id="inspector">
    <h3>Inspector</h3>
    <div id="inspector-content"><p class="empty">Select a node to inspect</p></div>
  </div>
  <div id="timeline">
    <div class="controls">
      <button id="btn-play" title="Play/Pause">▶</button>
    </div>
    <span class="time-label" id="time-current">0.0s</span>
    <input type="range" id="timeline-slider" min="0" max="100" value="100" disabled>
    <span class="time-label" id="time-total">0.0s</span>
  </div>
</div>
<script>
"use strict";

// ─── State ────────────────────────────────────────────────────────────────
const state = {
  store: null,           // InMemoryStore mirror (events[])
  runs: [],              // run summaries
  activeRunId: null,
  activeNode: null,
  events: [],            // all events for active run
  nodeEvents: {},        // nodeName -> events[]
  nodes: [],             // deduped node names in order
  edges: [],             // {from, to, count}
  playing: false,
  replayIndex: -1,       // -1 = live, 0..N = replay frame
  liveMode: true,
  ws: null,
  transform: { x: 0, y: 0, scale: 1 },
  nodePositions: {},     // nodeName -> {x, y}
};

// ─── Colors ────────────────────────────────────────────────────────────────
function nodeColor(name) {
  const lc = name.toLowerCase();
  if (lc.includes('tool')) return '#3fb950';
  if (lc.includes('cond') || lc.includes('router') || lc.includes('if') || lc.includes('gate')) return '#d29922';
  if (lc.includes('error') || lc.includes('fail')) return '#f85149';
  return '#a371f7'; // default: agent/LLM purple
}

// ─── DOM refs ──────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const svg = $('canvas-svg');
const runList = $('run-list');
const inspectorContent = $('inspector-content');
const statusBadge = $('status-badge');
const runInfo = $('run-info');
const timelineSlider = $('timeline-slider');
const timeCurrent = $('time-current');
const timeTotal = $('time-total');
const btnPlay = $('btn-play');

// ─── WebSocket ─────────────────────────────────────────────────────────────
function connectWS(runId) {
  if (state.ws) { state.ws.close(); state.ws = null; }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws/trace/${runId}`;
  state.ws = new WebSocket(url);
  state.ws.onmessage = (msg) => {
    try {
      const data = JSON.parse(msg.data);
      if (data.type === '__ping__') return;
      onTraceEvent(data);
    } catch (e) { /* ignore malformed */ }
  };
  state.ws.onclose = () => {
    if (state.ws) { state.ws = null; }
    statusBadge.textContent = 'disconnected';
    statusBadge.className = '';
  };
  state.ws.onerror = () => { state.ws.close(); };
}

function onTraceEvent(data) {
  state.events.push(data);
  const node = data.node || 'system';
  if (!state.nodeEvents[node]) state.nodeEvents[node] = [];
  state.nodeEvents[node].push(data);

  // Track nodes in order
  if (data.type === 'node_start' && !state.nodes.includes(node)) {
    state.nodes.push(node);
  }

  // Track edges
  if (data.type === 'node_end' && state.events.length > 1) {
    // Find the previous node_end or run_start
    for (let i = state.events.length - 2; i >= 0; i--) {
      const prev = state.events[i];
      if (prev.type === 'node_end' && prev.node && prev.node !== node) {
        const key = `${prev.node}->${node}`;
        const existing = state.edges.find(e => e.from === prev.node && e.to === node);
        if (existing) existing.count++;
        else state.edges.push({ from: prev.node, to: node, count: 1 });
        break;
      }
      if (prev.type === 'run_start') break;
    }
  }

  // Update status
  if (data.type === 'run_start') {
    statusBadge.textContent = '● Live';
    statusBadge.className = 'live';
    state.liveMode = true;
    timelineSlider.disabled = true;
    btnPlay.disabled = true;
  }
  if (data.type === 'run_end') {
    statusBadge.textContent = 'completed';
    statusBadge.className = '';
    timelineSlider.disabled = false;
    timelineSlider.max = state.events.length - 1;
    timelineSlider.value = state.events.length - 1;
    timeTotal.textContent = formatTime(data.data?.total_ms / 1000);
    btnPlay.disabled = false;
  }
  if (data.type === 'error') {
    statusBadge.textContent = 'error';
    statusBadge.className = 'error';
  }

  // Pulse node
  if (data.type === 'node_start' || data.type === 'node_end') {
    pulseNode(node);
  }

  // Update time
  const last = state.events[state.events.length - 1];
  if (last) {
    const start = state.events[0]?.ts || last.ts;
    timeCurrent.textContent = formatTime(last.ts - start);
  }

  renderGraph();
  refreshRunList();
}

// ─── Graph Layout ──────────────────────────────────────────────────────────
function layoutNodes() {
  const W = svg.clientWidth || 800;
  const H = svg.clientHeight || 600;
  const n = state.nodes.length;
  if (n === 0) return;
  const spacing = Math.min(160, (W - 80) / Math.max(n, 1));
  const totalW = (n - 1) * spacing;
  const startX = (W - totalW) / 2;
  const centerY = H / 2;
  state.nodes.forEach((name, i) => {
    state.nodePositions[name] = {
      x: startX + i * spacing,
      y: centerY + (i % 2 === 0 ? -20 : 20),
    };
  });
}

// ─── Render ────────────────────────────────────────────────────────────────
function renderGraph() {
  if (state.nodes.length === 0) return;
  layoutNodes();
  const W = svg.clientWidth || 800;
  const H = svg.clientHeight || 600;
  const { x: tx, y: ty, scale: s } = state.transform;
  const nodeW = 140, nodeH = 44;

  let html = `<g transform="translate(${tx},${ty}) scale(${s})">`;

  // Edges
  state.edges.forEach(edge => {
    const from = state.nodePositions[edge.from];
    const to = state.nodePositions[edge.to];
    if (!from || !to) return;
    const x1 = from.x + nodeW / 2, y1 = from.y;
    const x2 = to.x - nodeW / 2, y2 = to.y;
    const cy = (y1 + y2) / 2;
    const isActive = state.activeNode === edge.from || state.activeNode === edge.to;
    html += `<path class="edge-line${isActive ? ' active' : ''}" d="M${x1},${y1} Q${(x1+x2)/2},${cy} ${x2},${y2}"/>`;
    if (edge.count > 1) {
      html += `<text class="edge-label" x="${(x1+x2)/2}" y="${cy - 8}">${edge.count}x</text>`;
    }
  });

  // Nodes
  state.nodes.forEach(name => {
    const pos = state.nodePositions[name];
    if (!pos) return;
    const x = pos.x - nodeW / 2, y = pos.y - nodeH / 2;
    const color = nodeColor(name);
    const isActive = state.activeNode === name;
    const events = state.nodeEvents[name] || [];
    const lastEvent = events[events.length - 1];
    const latency = lastEvent?.data?.latency_ms;

    html += `<g class="node-group${isActive ? ' active' : ''}" data-node="${name}" onclick="selectNode('${name}')">`;
    html += `<rect class="node-rect" x="${x}" y="${y}" width="${nodeW}" height="${nodeH}" stroke="${color}"/>`;
    html += `<text class="node-label" x="${pos.x}" y="${pos.y - 2}">${name}</text>`;
    html += `<text class="node-type-badge" x="${pos.x}" y="${pos.y + 14}">${latency != null ? latency.toFixed(0) + 'ms' : events.length + ' ev'}</text>`;
    html += `</g>`;
  });

  html += `</g>`;
  svg.innerHTML = html;
}

function pulseNode(name) {
  const el = svg.querySelector(`[data-node="${name}"]`);
  if (el) {
    el.classList.remove('pulse');
    void el.offsetWidth; // reflow
    el.classList.add('pulse');
  }
}

// ─── Select Node ───────────────────────────────────────────────────────────
function selectNode(name) {
  state.activeNode = name;
  renderGraph();
  renderInspector(name);
}

function renderInspector(nodeName) {
  const events = state.nodeEvents[nodeName] || [];
  if (events.length === 0) {
    inspectorContent.innerHTML = '<p class="empty">No events for this node</p>';
    return;
  }

  const last = events[events.length - 1];
  const stateData = last.data?.delta || last.data?.state || {};
  const messages = events.filter(e => e.type === 'message' || e.type === 'tool_call');
  const latency = last.data?.latency_ms;

  let html = '';
  html += `<div class="section"><h4>Node: ${nodeName}</h4>`;
  html += `<p style="font-size:12px;color:var(--muted)">${events.length} events${latency != null ? ` · ${latency.toFixed(0)}ms` : ''}</p></div>`;

  if (Object.keys(stateData).length > 0) {
    html += `<div class="section"><h4>State</h4><pre>${escapeHTML(JSON.stringify(stateData, null, 2))}</pre></div>`;
  }

  if (messages.length > 0) {
    html += `<div class="section"><h4>Messages / Tool Calls</h4><ul class="event-list">`;
    messages.slice(-10).forEach(m => {
      const role = m.data?.role || m.data?.tool || '?';
      const content = (m.data?.content || m.data?.input || m.data?.output || '').slice(0, 120);
      html += `<li><span class="ev-type">${m.type}</span> <span class="ev-node">${role}</span> ${escapeHTML(content)}</li>`;
    });
    html += `</ul></div>`;
  }

  // Recent events
  html += `<div class="section"><h4>Recent Events</h4><ul class="event-list">`;
  events.slice(-5).reverse().forEach(e => {
    html += `<li><span class="ev-type">${e.type}</span> ${formatTime((e.ts - (state.events[0]?.ts || e.ts)))}</li>`;
  });
  html += `</ul></div>`;

  inspectorContent.innerHTML = html;
}

// ─── Run List ──────────────────────────────────────────────────────────────
function refreshRunList() {
  fetch('/runs')
    .then(r => r.json())
    .then(runs => {
      state.runs = runs;
      let html = '';
      runs.forEach(r => {
        const active = r.run_id === state.activeRunId ? ' active' : '';
        html += `<div class="run-item${active}" onclick="selectRun('${r.run_id}')">
          <div class="name"><span class="status-dot ${r.status}"></span>${escapeHTML(r.name || r.run_id)}</div>
          <div class="meta">${r.event_count} events · ${r.status}</div>
        </div>`;
      });
      runList.innerHTML = html || '<p style="padding:12px;color:var(--muted);font-size:12px;">No runs yet</p>';
    })
    .catch(() => {});
}

function selectRun(runId) {
  state.activeRunId = runId;
  state.activeNode = null;
  state.events = [];
  state.nodeEvents = {};
  state.nodes = [];
  state.edges = [];
  state.replayIndex = -1;
  state.liveMode = true;

  fetch(`/runs/${runId}/events`)
    .then(r => r.json())
    .then(events => {
      events.forEach(e => onTraceEvent(e));
      connectWS(runId);
      refreshRunList();
    })
    .catch(() => {});
}

// ─── Timeline ──────────────────────────────────────────────────────────────
timelineSlider.addEventListener('input', () => {
  const idx = parseInt(timelineSlider.value);
  state.replayIndex = idx;
  state.liveMode = false;
  if (idx >= 0 && idx < state.events.length) {
    const ev = state.events[idx];
    const start = state.events[0]?.ts || ev.ts;
    timeCurrent.textContent = formatTime(ev.ts - start);
    if (ev.node) pulseNode(ev.node);
  }
});

btnPlay.addEventListener('click', () => {
  if (state.playing) {
    state.playing = false;
    btnPlay.textContent = '▶';
    return;
  }
  state.playing = true;
  btnPlay.textContent = '⏸';
  state.liveMode = false;
  state.replayIndex = 0;
  playStep();
});

function playStep() {
  if (!state.playing) return;
  if (state.replayIndex >= state.events.length) {
    state.playing = false;
    btnPlay.textContent = '▶';
    timelineSlider.value = state.events.length - 1;
    return;
  }
  const ev = state.events[state.replayIndex];
  if (ev.node) pulseNode(ev.node);
  const start = state.events[0]?.ts || ev.ts;
  timeCurrent.textContent = formatTime(ev.ts - start);
  timelineSlider.value = state.replayIndex;
  state.replayIndex++;
  setTimeout(playStep, 200);
}

// ─── Pan/Zoom ──────────────────────────────────────────────────────────────
let isPanning = false, panStart = { x: 0, y: 0 };

svg.addEventListener('mousedown', (e) => {
  if (e.target.tagName === 'rect' || e.target.closest('.node-group')) return;
  isPanning = true;
  panStart = { x: e.clientX - state.transform.x, y: e.clientY - state.transform.y };
});

window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  state.transform.x = e.clientX - panStart.x;
  state.transform.y = e.clientY - panStart.y;
  renderGraph();
});

window.addEventListener('mouseup', () => { isPanning = false; });

svg.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  state.transform.scale = Math.max(0.2, Math.min(3, state.transform.scale * delta));
  renderGraph();
}, { passive: false });

// ─── Helpers ───────────────────────────────────────────────────────────────
function formatTime(seconds) {
  if (seconds == null || isNaN(seconds)) return '0.0s';
  if (seconds < 1) return (seconds * 1000).toFixed(0) + 'ms';
  return seconds.toFixed(1) + 's';
}

function escapeHTML(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ─── Init ──────────────────────────────────────────────────────────────────
refreshRunList();
setInterval(refreshRunList, 5000);

// Auto-select first run
setTimeout(() => {
  if (!state.activeRunId && state.runs.length > 0) {
    selectRun(state.runs[0].run_id);
  }
}, 500);
</script>
</body>
</html>
